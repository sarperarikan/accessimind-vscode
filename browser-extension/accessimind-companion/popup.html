<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AccessiMind Companion</title>
  <style>
    body {
      margin: 0;
      font: 13px/1.4 system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      width: 320px;
      padding: 14px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 16px;
    }
    p {
      margin: 0 0 10px;
      color: #cbd5e1;
    }
    .field {
      display: grid;
      gap: 6px;
      margin-bottom: 10px;
    }
    input, button {
      width: 100%;
      box-sizing: border-box;
      border-radius: 8px;
      border: 1px solid rgba(148, 163, 184, 0.35);
      padding: 10px;
    }
    input {
      background: #111827;
      color: #f8fafc;
    }
    button {
      background: #0f766e;
      color: #f8fafc;
      cursor: pointer;
    }
    .status {
      margin-top: 10px;
      padding: 10px;
      border-radius: 8px;
      background: rgba(59, 130, 246, 0.16);
      color: #bfdbfe;
    }
  </style>
</head>
<body>
  <h1>AccessiMind Companion</h1>
  <p>Paste the endpoint and session token from the VS Code Browser Session panel, then right-click a page element.</p>
  <div class="field">
    <label for="endpointUrl">Endpoint URL</label>
    <input id="endpointUrl" type="text" placeholder="http://127.0.0.1:3210/accessimind/selection">
  </div>
  <div class="field">
    <label for="sessionToken">Session token</label>
    <input id="sessionToken" type="text" placeholder="Paste token from VS Code">
  </div>
  <button id="save" type="button">Save connection</button>
  <div id="status" class="status" aria-live="polite">Waiting for configuration.</div>
  <script src="popup.js"></script>
</body>
</html>
